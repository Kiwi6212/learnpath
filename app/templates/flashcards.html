{% extends "base.html" %}
{% block title %}LearnPath - {{ module.titre }} - Flashcards{% endblock %}
{% block content %}

<div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="mb-6">
        <a href="/parcours/{{ parcours.id }}/module/{{ module.id }}" class="text-sm dark:text-dark-muted text-light-muted hover:text-blue-500 mb-4 inline-block">
            &larr; {{ module.titre }} - <span data-i18n="level">Niveau</span> {{ niveau }}
        </a>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🃏</span>
                <h2 class="text-2xl font-bold" data-i18n="flashcards">Flashcards</h2>
            </div>
            <label class="flex items-center gap-2 text-sm dark:text-dark-muted text-light-muted cursor-pointer">
                <input type="checkbox" id="random-toggle" class="rounded" onchange="toggleRandom()">
                <span data-i18n="random_mode">Mode aléatoire</span>
            </label>
        </div>
    </div>

    <!-- Progress -->
    <div class="mb-6">
        <div class="flex justify-between text-sm dark:text-dark-muted text-light-muted mb-2">
            <span id="fc-counter">1/{{ cards|length }}</span>
            <span id="fc-stats"></span>
        </div>
        <div class="h-2 dark:bg-dark-border bg-gray-200 rounded-full overflow-hidden">
            <div id="fc-progress" class="h-full bg-purple-500 rounded-full progress-bar" style="width: 0%"></div>
        </div>
    </div>

    <!-- Flashcard area -->
    <div id="fc-area">
        <div class="flip-card w-full h-64 md:h-80 cursor-pointer mb-6" id="flashcard" onclick="flipCard()">
            <div class="flip-card-inner relative w-full h-full">
                <div class="flip-card-front absolute inset-0 dark:bg-dark-card bg-light-card rounded-xl border dark:border-dark-border border-light-border flex items-center justify-center p-8">
                    <p id="fc-front" class="text-2xl font-semibold text-center"></p>
                </div>
                <div class="flip-card-back absolute inset-0 dark:bg-dark-card bg-light-card rounded-xl border-2 border-purple-500/50 flex items-center justify-center p-8">
                    <p id="fc-back" class="text-xl text-center dark:text-dark-muted text-light-muted"></p>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div id="fc-buttons" class="hidden flex gap-4 justify-center">
            <button onclick="reviewCard(false)" class="flex-1 max-w-xs py-3 bg-red-500/20 border border-red-500/40 text-red-400 rounded-xl font-medium hover:bg-red-500/30 transition-colors">
                <span data-i18n="to_review">À revoir ✗</span>
            </button>
            <button onclick="reviewCard(true)" class="flex-1 max-w-xs py-3 bg-green-500/20 border border-green-500/40 text-green-400 rounded-xl font-medium hover:bg-green-500/30 transition-colors">
                <span data-i18n="i_knew">Je savais ✓</span>
            </button>
        </div>
    </div>

    <!-- Results -->
    <div id="fc-results" class="hidden">
        <div class="dark:bg-dark-card bg-light-card rounded-xl p-8 border dark:border-dark-border border-light-border text-center">
            <h3 class="text-2xl font-bold mb-6">Résumé</h3>
            <div class="flex justify-center gap-8 mb-6">
                <div>
                    <div id="fc-known-count" class="text-4xl font-bold text-green-400"></div>
                    <div class="text-sm dark:text-dark-muted text-light-muted" data-i18n="known">Connues</div>
                </div>
                <div>
                    <div id="fc-review-count" class="text-4xl font-bold text-red-400"></div>
                    <div class="text-sm dark:text-dark-muted text-light-muted" data-i18n="to_review_count">À revoir</div>
                </div>
            </div>
            <div class="flex gap-4 justify-center">
                <button onclick="restartCards()" class="px-6 py-2.5 dark:bg-dark-border bg-gray-200 rounded-lg font-medium hover:opacity-80">
                    <span data-i18n="retry">Recommencer</span>
                </button>
                <a href="/parcours/{{ parcours.id }}/module/{{ module.id }}" class="px-6 py-2.5 bg-purple-600 text-white rounded-lg font-medium hover:bg-purple-700">
                    <span data-i18n="continue_">Continuer</span>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
const allCards = {{ cards|tojson }};
let cards = [...allCards];
let currentCard = 0;
let knownCount = 0;
let reviewCount = 0;
let flipped = false;

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function toggleRandom() {
    cards = [...allCards];
    if (document.getElementById('random-toggle').checked) shuffleArray(cards);
    currentCard = 0; knownCount = 0; reviewCount = 0;
    renderCard();
}

function renderCard() {
    if (currentCard >= cards.length) { showCardResults(); return; }
    const c = cards[currentCard];
    const isEn = currentLang === 'en';
    document.getElementById('fc-front').textContent = isEn && c.recto_en ? c.recto_en : c.recto;
    document.getElementById('fc-back').textContent = isEn && c.verso_en ? c.verso_en : c.verso;
    document.getElementById('fc-counter').textContent = (currentCard + 1) + '/' + cards.length;
    document.getElementById('fc-progress').style.width = (currentCard / cards.length * 100) + '%';
    document.getElementById('fc-stats').textContent = '✓ ' + knownCount + ' / ✗ ' + reviewCount;

    document.getElementById('flashcard').classList.remove('flipped');
    document.getElementById('fc-buttons').classList.add('hidden');
    flipped = false;
}

function flipCard() {
    if (!flipped) {
        document.getElementById('flashcard').classList.add('flipped');
        document.getElementById('fc-buttons').classList.remove('hidden');
        flipped = true;
    }
}

function reviewCard(known) {
    if (known) knownCount++; else reviewCount++;
    const c = cards[currentCard];

    fetch('/api/flashcards/review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ card_id: c.id || (currentCard + ''), known })
    });

    currentCard++;
    renderCard();
}

function showCardResults() {
    document.getElementById('fc-area').classList.add('hidden');
    document.getElementById('fc-results').classList.remove('hidden');
    document.getElementById('fc-known-count').textContent = knownCount;
    document.getElementById('fc-review-count').textContent = reviewCount;
}

function restartCards() {
    currentCard = 0; knownCount = 0; reviewCount = 0;
    if (document.getElementById('random-toggle').checked) shuffleArray(cards);
    document.getElementById('fc-area').classList.remove('hidden');
    document.getElementById('fc-results').classList.add('hidden');
    renderCard();
}

document.addEventListener('DOMContentLoaded', () => {
    if (cards.length > 0) renderCard();
    else document.getElementById('fc-area').innerHTML = '<div class="dark:bg-dark-card bg-light-card rounded-xl p-8 border dark:border-dark-border border-light-border text-center dark:text-dark-muted text-light-muted">Aucune flashcard disponible</div>';
});
</script>

{% endblock %}
