{% extends "base.html" %}
{% block title %}LearnPath - {{ module.titre }} - Cours{% endblock %}
{% block content %}

<div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="mb-6">
        <a href="/parcours/{{ parcours.id }}/module/{{ module.id }}" class="text-sm dark:text-dark-muted text-light-muted hover:text-blue-500 mb-4 inline-block">
            &larr; {{ module.titre }} - <span data-i18n="level">Niveau</span> {{ niveau }}
        </a>
        <div class="flex items-center gap-3">
            <span class="text-2xl">📖</span>
            <h2 class="text-2xl font-bold" data-i18n="cours">Cours</h2>
        </div>
    </div>

    <!-- Reading progress bar -->
    <div class="fixed top-0 left-0 right-0 h-1 z-50">
        <div id="read-progress" class="h-full bg-blue-500 transition-all duration-150" style="width: 0%"></div>
    </div>

    <!-- Course content -->
    <style>
        .course-md h1, .course-md h2, .course-md h3 { color: #fff; margin-bottom: 0.75rem; margin-top: 1.5rem; font-weight: 700; }
        .course-md h1 { font-size: 1.875rem; }
        .course-md h2 { font-size: 1.5rem; }
        .course-md h3 { font-size: 1.25rem; }
        .course-md p { line-height: 1.7; margin-bottom: 1rem; }
        .course-md ul, .course-md ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        .course-md ul { list-style-type: disc; }
        .course-md ol { list-style-type: decimal; }
        .course-md li { margin-bottom: 0.25rem; }
        .course-md code { background: #1e2530; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #79c0ff; font-size: 0.9em; }
        .course-md pre code { background: #1e2530; padding: 1rem; border-radius: 8px; display: block; overflow-x: auto; color: #c9d1d9; }
        .course-md pre { margin-bottom: 1rem; }
        .course-md strong { color: #fff; }
        .course-md hr { border-color: #30363d; margin: 1.5rem 0; }
        .course-md table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .course-md th, .course-md td { padding: 8px 12px; border: 1px solid #30363d; }
        .course-md th { background: #161b22; color: #fff; font-weight: 600; }
        .course-md a { color: #58a6ff; text-decoration: underline; }
        .course-md blockquote { border-left: 3px solid #30363d; padding-left: 1rem; color: #8b949e; margin-bottom: 1rem; }

        /* Light mode overrides */
        html:not(.dark) .course-md h1, html:not(.dark) .course-md h2, html:not(.dark) .course-md h3,
        html:not(.dark) .course-md strong { color: #24292f; }
        html:not(.dark) .course-md code { background: #f0f3f6; color: #0550ae; }
        html:not(.dark) .course-md pre code { background: #f6f8fa; color: #24292f; }
        html:not(.dark) .course-md th { background: #f6f8fa; color: #24292f; }
        html:not(.dark) .course-md th, html:not(.dark) .course-md td { border-color: #d0d7de; }
        html:not(.dark) .course-md hr { border-color: #d0d7de; }
        html:not(.dark) .course-md blockquote { border-left-color: #d0d7de; color: #57606a; }
        html:not(.dark) .course-md a { color: #0969da; }
    </style>
    <div id="course-content" class="course-md dark:bg-dark-card bg-light-card rounded-xl p-8 border dark:border-dark-border border-light-border max-w-none">
        {{ cours_html|safe }}
    </div>

    <!-- Mark as read button -->
    <div class="mt-6 flex justify-center">
        <button id="mark-read-btn" onclick="markAsRead()"
            class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors text-lg">
            <span data-i18n="mark_read">Marquer comme lu</span> ✓
        </button>
    </div>
</div>

<script>
// Reading progress
const content = document.getElementById('course-content');
window.addEventListener('scroll', () => {
    const winH = window.innerHeight;
    const docH = document.documentElement.scrollHeight;
    const scrolled = window.scrollY;
    const pct = Math.min(100, (scrolled / (docH - winH)) * 100);
    document.getElementById('read-progress').style.width = pct + '%';
});

function markAsRead() {
    const btn = document.getElementById('mark-read-btn');
    btn.disabled = true;
    btn.textContent = '...';

    fetch('/api/parcours/{{ parcours.id }}/module/{{ module.id }}/cours/{{ niveau }}/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            btn.className = 'px-8 py-3 bg-green-600 text-white font-medium rounded-xl text-lg cursor-default';
            btn.innerHTML = t('completed') + ' ✓ (+' + data.xp + ' XP)';
        }
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = t('mark_read') + ' ✓';
    });
}

document.addEventListener('DOMContentLoaded', () => hljs.highlightAll());
</script>

{% endblock %}
